<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Question For abdullah ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#090909,#1a001f,#300020);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite alternate;
}

.container{
    text-align:center;
    padding:30px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:40px;
    box-shadow:0 0 30px rgba(255,255,255,.1);
}

h1{
    font-size:3rem;
    margin-bottom:20px;
}

p{
    font-size:1.2rem;
    margin-bottom:25px;
}

button{
    border:none;
    border-radius:40px;
    padding:15px 35px;
    font-size:1.2rem;
    cursor:pointer;
    transition:.3s;
}

#yesBtn{
    background:#ff2d55;
    color:white;
}

#yesBtn:hover{
    transform:scale(1.1);
}

#noBtn{
    background:white;
    position:absolute;
}

.hidden{
    display:none;
}

.heart-container{
    text-align:center;
}

.heart{
    position:relative;
    width:220px;
    height:220px;
    background:#ff1744;
    transform:rotate(-45deg);
    margin:auto;
    animation:beat 1s infinite;
    box-shadow:0 0 60px #ff1744;
}

.heart::before,
.heart::after{
    content:"";
    position:absolute;
    width:220px;
    height:220px;
    background:#ff1744;
    border-radius:50%;
}

.heart::before{
    top:-110px;
    left:0;
}

.heart::after{
    left:110px;
    top:0;
}

.big-text{
    margin-top:80px;
    font-size:3rem;
    font-weight:bold;
}

.sub{
    margin-top:20px;
    font-size:1.4rem;
}

.floating-heart{
    position:fixed;
    color:red;
    animation:floatUp 6s linear forwards;
    pointer-events:none;
}

@keyframes beat{
    0%,100%{
        transform:rotate(-45deg) scale(1);
    }
    50%{
        transform:rotate(-45deg) scale(1.15);
    }
}

@keyframes floatUp{
    0%{
        transform:translateY(0);
        opacity:1;
    }
    100%{
        transform:translateY(-120vh);
        opacity:0;
    }
}

@keyframes twinkle{
    from{opacity:.2}
    to{opacity:1}
}

.typewriter{
    overflow:hidden;
    white-space:nowrap;
    border-right:3px solid white;
    animation:typing 4s steps(40,end),
    blink .7s infinite;
}

@keyframes typing{
    from{width:0}
    to{width:100%}
}

@keyframes blink{
    50%{border-color:transparent}
}
</style>
</head>
<body>

<div class="stars"></div>

<div class="container" id="questionScreen">
    <div class="card">
        <h1>💌 Hey abdullah</h1>
        <p>I have a very important question...</p>
        <h2>Do you love me? ❤️</h2>
        <br>

        <button id="yesBtn">YES ❤️</button>
        <button id="noBtn">NO 😅</button>
    </div>
</div>

<div class="hidden heart-container" id="loveScreen">
    <div class="heart"></div>

    <div class="big-text typewriter">
        Mai ❤️
    </div>

    <div class="sub">
        You just made my day ✨
        <br><br>
        You are more special than you know ❤️
    </div>
</div>

<script>

// Stars
const stars = document.querySelector(".stars");

for(let i=0;i<250;i++){
    const star=document.createElement("div");
    star.classList.add("star");
    star.style.left=Math.random()*100+"%";
    star.style.top=Math.random()*100+"%";
    star.style.animationDelay=Math.random()*2+"s";
    stars.appendChild(star);
}

// No button trolling
const noBtn=document.getElementById("noBtn");
const yesBtn=document.getElementById("yesBtn");

const messages=[
"Are you sure? 🥺",
"Really? 😭",
"Think again 😢",
"Wrong answer 😂",
"Try YES ❤️",
"Not happening 😎",
"You can't catch me 😜"
];

let count=0;

noBtn.addEventListener("mouseover",()=>{

    const x=Math.random()*(window.innerWidth-150);
    const y=Math.random()*(window.innerHeight-80);

    noBtn.style.left=x+"px";
    noBtn.style.top=y+"px";

    noBtn.innerText=messages[count % messages.length];

    count++;

    let size=1+(count*0.08);
    yesBtn.style.transform=`scale(${size})`;
});

// Yes button
yesBtn.addEventListener("click",()=>{

    document.getElementById("questionScreen").style.display="none";
    document.getElementById("loveScreen").classList.remove("hidden");

    createHearts();

});

// Floating hearts
function createHearts(){

    setInterval(()=>{

        const heart=document.createElement("div");

        heart.innerHTML="❤️";
        heart.classList.add("floating-heart");

        heart.style.left=Math.random()*100+"vw";
        heart.style.bottom="-20px";
        heart.style.fontSize=(20+Math.random()*40)+"px";

        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },6000);

    },200);
}

</script>

</body>
</html>
